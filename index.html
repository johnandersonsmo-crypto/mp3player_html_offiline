
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Player MP3 Universal - Rápido e Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/400.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/600.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f11;
            color: #e4e4e7;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #22c55e; cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #3f3f46; border-radius: 2px;
        }
        .song-row.active { background-color: rgba(34, 197, 94, 0.15); border-left: 3px solid #22c55e; }
        /* Estilo do coração favorito */
        .fav-btn svg { transition: all 0.2s; }
        .fav-btn.active svg { fill: #ef4444; stroke: #ef4444; transform: scale(1.1); }
        .fav-btn:not(.active) svg { fill: transparent; stroke: #71717a; }
        .fav-btn:hover svg { stroke: #ef4444; }

        #loadingOverlay { display: none; }

        /* Barra lateral com altura fixa baseada na viewport (desktop) */
        @media (min-width: 768px) {
            aside {
                height: calc(100vh - 100px);
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div id="loadingOverlay" class="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center text-white p-6 text-center">
        <div class="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold mb-2">Processando Biblioteca</h2>
        <p id="loadingStatus" class="text-zinc-400">Preparando arquivos...</p>
        <div class="w-full max-w-xs bg-zinc-800 h-2 rounded-full mt-4 overflow-hidden">
            <div id="loadingBar" class="bg-green-500 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div class="w-full max-w-7xl flex flex-col md:flex-row gap-6" style="min-height: calc(100vh - 100px);">

        <!-- Barra Lateral -->
        <aside class="w-full md:w-64 bg-zinc-900 rounded-2xl border border-zinc-800 shadow-xl flex flex-col overflow-hidden flex-shrink-0 max-h-[50vh] md:max-h-none">
            <div class="p-4 border-b border-zinc-800 flex-shrink-0">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Artistas
                </h2>
                <p class="text-zinc-400 text-xs mt-1" id="artistCount">0 artistas</p>

                <!-- Pesquisa de Artistas -->
                <input type="text" id="artistSearch" oninput="filterArtists()" placeholder="Buscar artista..."
                       class="w-full mt-3 bg-zinc-800 text-white text-sm rounded-lg px-3 py-2 border border-zinc-700 focus:outline-none focus:border-green-500">
            </div>

            <div id="artistsList" class="flex-1 overflow-y-auto p-2 space-y-1 min-h-0">
                <!-- Lista de artistas injetada via JS -->
            </div>
        </aside>

        <!-- Área Principal -->
        <div class="flex-1 flex flex-col min-w-0 gap-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-xl">
                <div>
                    <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                        Player MP3 Offline
                    </h1>
                    <p class="text-zinc-400 text-sm mt-1">Músicas salvas no navegador para acesso permanente.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="clearLibrary()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-semibold py-3 px-4 rounded-xl transition-all border border-zinc-700 text-sm">
                        Limpar Biblioteca
                    </button>
                    <label class="cursor-pointer bg-green-600 hover:bg-green-500 text-white font-semibold py-3 px-6 rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-green-900/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                        Carregar Pasta
                        <input type="file" id="fileInput" webkitdirectory directory multiple accept="audio/*" class="hidden">
                    </label>
                </div>
            </div>

            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-xl">
                <div class="text-center mb-6">
                    <div id="currentSongTitle" class="text-xl font-bold text-white truncate px-4">Pronto para tocar</div>
                    <div id="currentSongMeta" class="text-zinc-400 text-sm mt-2 px-4">Selecione uma música</div>
                    <div id="cacheStatus" class="text-xs text-green-400 font-medium mt-4">Aguardando arquivos...</div>
                </div>

                <audio id="audio"></audio>

                <div class="mb-6">
                    <input type="range" id="progress" value="0" min="0" max="100" class="w-full mb-2">
                    <div class="flex justify-between text-xs text-zinc-400 font-mono">
                        <span id="currentTime">00:00</span>
                        <span id="duration">00:00</span>
                    </div>
                </div>

                <div class="flex justify-center items-center gap-4 mb-6">
                    <button onclick="toggleShuffle()" id="btnShuffle" class="p-3 rounded-full text-zinc-400 hover:text-white transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3" /></svg>
                    </button>
                    <button onclick="prevSong()" class="p-3 rounded-full text-white hover:bg-zinc-800 transition-all"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg></button>
                    <button onclick="togglePlay()" id="btnPlay" class="p-4 rounded-full bg-green-500 text-black hover:bg-green-400 transition-all shadow-lg"><svg id="iconPlay" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg><svg id="iconPause" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg></button>
                    <button onclick="nextSong()" class="p-3 rounded-full text-white hover:bg-zinc-800 transition-all"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg></button>
                    <button onclick="toggleLoop()" id="btnLoop" class="p-3 rounded-full text-zinc-400 hover:text-white transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></button>
                </div>

                <div class="flex items-center gap-3 max-w-xs mx-auto">
                    <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                    <input type="range" id="volume" min="0" max="1" step="0.01" value="1" class="flex-1">
                </div>
            </div>

            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 shadow-xl overflow-hidden flex flex-col flex-1" style="min-height: 400px;">
                <div class="flex items-center gap-2 p-4 border-b border-zinc-800 overflow-x-auto">
                    <button onclick="setView('all')" id="tab-all" class="px-4 py-2 rounded-lg text-sm font-semibold bg-zinc-800 text-white whitespace-nowrap">Todas</button>
                    <!-- Botão Favoritos com Coração -->
                    <button onclick="setView('favorites')" id="tab-favorites" class="px-4 py-2 rounded-lg text-sm font-semibold text-zinc-400 hover:bg-zinc-800 hover:text-white whitespace-nowrap flex items-center gap-1 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        Favoritas
                    </button>
                    <div id="playlistTabs" class="flex items-center gap-2"></div>
                </div>

                <div class="p-4 border-b border-zinc-800">
                    <input type="text" id="searchInput" oninput="filterSongs()" placeholder="Pesquisar músicas..." class="w-full bg-zinc-800 text-white rounded-xl px-4 py-3 border border-zinc-700 focus:outline-none focus:border-green-500" />
                </div>

                <div id="playlistContainer" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <div class="text-center text-zinc-500 py-12">Nenhuma música carregada.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let songs = [];
        let filteredSongs = []; // Lista atualmente visível (filtrada)
        let currentIndex = -1; // Índice na lista FILTRADA
        let isPlaying = false;
        let shuffle = false;
        let loop = false;
        let currentView = 'all'; // 'all', 'favorites', 'artist'
        let currentArtistFilter = null;
        let searchQuery = '';
        let favorites = new Set();
        let db = null;

        // Variáveis para o Shuffle Real
        let shuffledQueue = []; // Fila embaralhada com índices da lista filtrada
        let queueIndex = 0; // Índice atual na fila embaralhada

        const DB_NAME = 'OfflineMP3Player';
        const DB_VERSION = 1;
        const STORE_NAME = 'songs';

        const audio = document.getElementById('audio');
        const playlistContainer = document.getElementById('playlistContainer');
        const currentSongTitle = document.getElementById('currentSongTitle');
        const currentSongMeta = document.getElementById('currentSongMeta');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const cacheStatus = document.getElementById('cacheStatus');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingStatus = document.getElementById('loadingStatus');
        const loadingBar = document.getElementById('loadingBar');
        const artistSearchInput = document.getElementById('artistSearch');

        // Inicializa Banco de Dados
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function loadFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveToDB(song) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(song);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function init() {
            try {
                await initDB();
                const saved = await loadFromDB();

                if (saved.length > 0) {
                    songs = saved.map(s => ({
                        ...s,
                        url: URL.createObjectURL(s.file)
                    }));
                    updateCacheStatus(`✓ ${songs.length} músicas carregadas da memória`);
                    applyFilter(); // Aplica filtro inicial e renderiza
                    updateArtists();
                }

                const favs = localStorage.getItem('mp3_favs');
                if (favs) favorites = new Set(JSON.parse(favs));

                setupEventListeners();
            } catch (err) {
                console.error("Erro na inicialização:", err);
                updateCacheStatus("Erro ao carregar banco de dados.");
            }
        }

        function setupEventListeners() {
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|wav|ogg|flac|m4a)$/i));
                if (files.length === 0) return;
                await processFiles(files);
            });

            audio.ontimeupdate = () => {
                if (isNaN(audio.duration)) return;
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.value = percent;
                currentTimeEl.innerText = formatTime(audio.currentTime);
                durationEl.innerText = formatTime(audio.duration);
            };

            audio.onended = () => {
                if (loop && !shuffle) {
                    // Se loop estiver ativo e não estiver em shuffle, repete a música atual
                    audio.currentTime = 0;
                    audio.play();
                } else {
                    nextSong();
                }
            };
            progress.oninput = () => {
                const time = (progress.value / 100) * audio.duration;
                audio.currentTime = time;
            };
            volumeSlider.oninput = () => { audio.volume = volumeSlider.value; };
        }

        async function processFiles(files) {
            loadingOverlay.style.display = 'flex';
            let processed = 0;
            const total = files.length;

            for (const file of files) {
                processed++;
                const percent = Math.round((processed / total) * 100);
                loadingStatus.innerText = `Salvando: ${file.name} (${processed}/${total})`;
                loadingBar.style.width = `${percent}%`;

                const id = file.webkitRelativePath || file.name;
                const songObj = {
                    id: id,
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    file: file,
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    artist: "Desconhecido",
                    album: "Desconhecido"
                };

                try {
                    await new Promise(resolve => {
                        jsmediatags.read(file, {
                            onSuccess: (tag) => {
                                songObj.title = tag.tags.title || songObj.title;
                                songObj.artist = tag.tags.artist || "Desconhecido";
                                songObj.album = tag.tags.album || "Desconhecido";
                                resolve();
                            },
                            onError: () => resolve()
                        });
                    });
                } catch (e) { console.warn("Erro ao ler tags de", file.name); }

                await saveToDB(songObj);

                const exists = songs.findIndex(s => s.id === id);
                const newSong = { ...songObj, url: URL.createObjectURL(file) };
                if (exists !== -1) songs[exists] = newSong; else songs.push(newSong);
            }

            loadingOverlay.style.display = 'none';
            updateCacheStatus(`✓ ${songs.length} músicas prontas`);
            applyFilter();
            updateArtists();
        }

        // Função central de filtragem
        function applyFilter() {
            let result = songs;

            // 1. Filtro por Tipo de Visualização (Todos, Favoritos, Artista)
            if (currentView === 'favorites') {
                result = result.filter(s => favorites.has(s.id));
            } else if (currentView === 'artist' && currentArtistFilter) {
                result = result.filter(s => s.artist === currentArtistFilter);
            }

            // 2. Filtro por Texto (Busca)
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                result = result.filter(s =>
                    s.title.toLowerCase().includes(q) ||
                    s.artist.toLowerCase().includes(q)
                );
            }

            filteredSongs = result;

            // Quando o filtro muda, precisamos reembaralhar se o shuffle estiver ativo
            if (shuffle) {
                reshuffleQueue();
            }

            // Se a música atual não estiver mais na lista filtrada, para ou reseta
            if (currentIndex !== -1 && filteredSongs.length > 0) {
                // Verifica se o índice atual ainda aponta para a mesma música lógica
                // Mas como o índice é relativo à lista filtrada, precisamos ter cuidado.
                // A abordagem mais segura é: se mudamos de filtro drasticamente, paramos.
                // Mas se estamos apenas digitando na busca, mantemos se possível.
                // Para simplificar a lógica de "clicar no artista e tocar":
                // Vamos apenas re-renderizar. A lógica de play está nos cliques dos botões.
            } else if (filteredSongs.length === 0) {
                currentIndex = -1;
                audio.pause();
                isPlaying = false;
                updateControls();
                currentSongTitle.innerText = "Nenhuma música encontrada";
                currentSongMeta.innerText = "";
            }

            renderSongs();
            updateTabStyles();
        }

        function renderSongs() {
            if (filteredSongs.length === 0) {
                playlistContainer.innerHTML = `<div class="text-center text-zinc-500 py-12">Nenhuma música encontrada</div>`;
                return;
            }

            playlistContainer.innerHTML = filteredSongs.map((song, index) => {
                // Precisamos encontrar o ID real para checar favoritos
                const isFav = favorites.has(song.id);
                // O índice aqui é o índice NA LISTA FILTRADA
                const isActive = currentIndex === index;

                return `
                    <div class="song-row flex items-center gap-4 p-3 rounded-xl hover:bg-zinc-800/50 cursor-pointer transition-all ${isActive ? 'active' : ''}" onclick="playAtFilteredIndex(${index})">
                        <div class="w-10 h-10 bg-zinc-800 rounded-lg flex items-center justify-center text-zinc-500 flex-shrink-0">
                            ${isActive && isPlaying ? '🔊' : '▶️'}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-semibold truncate">${song.title}</div>
                            <div class="text-zinc-500 text-sm truncate">${song.artist}</div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleFavorite('${song.id}')" class="fav-btn ${isFav ? 'active' : ''} p-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Toca baseado no índice da lista FILTRADA
        function playAtFilteredIndex(index) {
            if (index < 0 || index >= filteredSongs.length) return;

            currentIndex = index;

            const song = filteredSongs[index];

            audio.src = song.url;
            currentSongTitle.innerText = song.title;
            currentSongMeta.innerText = song.artist;

            playSong();

            renderSongs();
        }

        function playSong() {
            audio.play();
            isPlaying = true;
            updateControls();
        }
        function pauseSong() { audio.pause(); isPlaying = false; updateControls(); }
        function togglePlay() {
            if (filteredSongs.length === 0) return;
            if (currentIndex === -1) playAtFilteredIndex(0);
            else if (isPlaying) pauseSong();
            else playSong();
        }

        function updateControls() {
            iconPlay.classList.toggle('hidden', isPlaying);
            iconPause.classList.toggle('hidden', !isPlaying);
        }

        function nextSong() {
            if (filteredSongs.length === 0) return;

            let next;

            if (shuffle) {
                // Avança para o próximo índice na fila embaralhada
                queueIndex++;

                // Se chegou ao fim da fila, reembaralha e começa do zero
                if (queueIndex >= shuffledQueue.length) {
                    reshuffleQueue();
                    queueIndex = 0;
                }

                next = shuffledQueue[queueIndex];
            } else {
                next = currentIndex + 1;

                if (next >= filteredSongs.length) {
                    next = 0;
                }
            }

            playAtFilteredIndex(next);
        }

        function prevSong() {
            if (filteredSongs.length === 0) return;
            let prev = currentIndex - 1;
            if (prev < 0) prev = filteredSongs.length - 1;
            playAtFilteredIndex(prev);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const r = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${r.toString().padStart(2, '0')}`;
        }

        function toggleShuffle() {
            shuffle = !shuffle;
            const btnShuffle = document.getElementById('btnShuffle');
            if (shuffle) {
                btnShuffle.classList.add('text-green-500');
                btnShuffle.classList.remove('text-zinc-400', 'hover:text-white');
                // Cria a fila embaralhada quando ativa o shuffle
                reshuffleQueue();
                // Garante começar da música atual
                const pos = shuffledQueue.indexOf(currentIndex);
                queueIndex = pos >= 0 ? pos : 0;
            } else {
                btnShuffle.classList.remove('text-green-500');
                btnShuffle.classList.add('text-zinc-400', 'hover:text-white');
            }
        }

        // Função Fisher-Yates para embaralhar array
        function shuffleArray(array) {
            let copia = [...array];
            for (let i = copia.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [copia[i], copia[j]] = [copia[j], copia[i]];
            }
            return copia;
        }

        // Cria ou recria a fila embaralhada com todos os índices da lista filtrada
        function reshuffleQueue() {
            shuffledQueue = shuffleArray(filteredSongs.map((_, index) => index));
            queueIndex = 0;
        }
        function toggleLoop() {
            loop = !loop;
            const btnLoop = document.getElementById('btnLoop');
            if (loop) {
                btnLoop.classList.add('text-green-500');
                btnLoop.classList.remove('text-zinc-400', 'hover:text-white');
            } else {
                btnLoop.classList.remove('text-green-500');
                btnLoop.classList.add('text-zinc-400', 'hover:text-white');
            }
        }

        function toggleFavorite(id) {
            if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
            localStorage.setItem('mp3_favs', JSON.stringify([...favorites]));

            // Se estivermos na view de favoritos e removermos o favorito, a lista muda
            if (currentView === 'favorites') {
                applyFilter();
            } else {
                // Apenas atualiza o ícone na lista atual
                renderSongs();
                updateTabStyles(); // Atualiza o coração da aba se necessário
            }
        }

        function setView(view, artistName = null) {
            currentView = view;
            currentArtistFilter = artistName;

            // Limpa a busca de texto ao mudar de aba principal para não confundir
            if (view === 'all' || view === 'favorites') {
                searchQuery = '';
                document.getElementById('searchInput').value = '';
            }

            // Reembaralha a fila se o shuffle estiver ativo quando muda a visualização
            if (shuffle) {
                reshuffleQueue();
            }

            applyFilter();
            updateArtists(); // Para atualizar o estilo "ativo" na sidebar se necessário

            // Tocar automaticamente se houver músicas e nada estiver tocando ou se mudou de contexto
            if (filteredSongs.length > 0) {
                // Se já estava tocando algo fora do contexto atual, troca.
                // Se estava pausado, também inicia para dar feedback do clique.
                if (currentIndex === -1 || !isPlaying) {
                     playAtFilteredIndex(0);
                } else {
                    // Se já estava tocando, verificamos se a música atual pertence ao novo filtro.
                    // Se não pertencer, toca a primeira do novo filtro.
                    // Melhor lógica: Ao mudar de view, o currentIndex fica inválido para a nova lista.
                    // Então sempre começamos do 0 ou mantemos se a música existir na nova lista.
                    // Para simplificar e atender o pedido "ao clicar toca":
                    playAtFilteredIndex(0);
                }
            }
        }

        function updateTabStyles() {
            const tabAll = document.getElementById('tab-all');
            const tabFav = document.getElementById('tab-favorites');
            const heartIcon = tabFav.querySelector('svg');

            if (currentView === 'all') {
                tabAll.classList.add('bg-zinc-800', 'text-white');
                tabAll.classList.remove('text-zinc-400');
                tabFav.classList.remove('bg-zinc-800', 'text-red-500');
                tabFav.classList.add('text-zinc-400');
                // Coração vazio
                heartIcon.setAttribute('fill', 'none');
                heartIcon.setAttribute('stroke', 'currentColor');
            } else if (currentView === 'favorites') {
                tabFav.classList.add('bg-zinc-800', 'text-red-500');
                tabFav.classList.remove('text-zinc-400');
                tabAll.classList.remove('bg-zinc-800', 'text-white');
                tabAll.classList.add('text-zinc-400');
                // Coração preenchido
                heartIcon.setAttribute('fill', '#ef4444');
                heartIcon.setAttribute('stroke', '#ef4444');
            }
        }

        function filterSongs() {
            searchQuery = document.getElementById('searchInput').value;
            // Reembaralha a fila se o shuffle estiver ativo quando a busca muda
            if (shuffle) {
                reshuffleQueue();
            }
            applyFilter();
        }

        // Funções da Sidebar de Artistas

        function updateArtists() {
            const artistsMap = {};

            songs.forEach(s => {
                if (!s.artist) return;

                // Usa o nome do artista exatamente como está no metadado, sem separar ou limpar
                const name = s.artist.trim();

                if (name) {
                    // Agrupa exatamente pelo nome original
                    const key = name;

                    if (!artistsMap[key]) {
                        artistsMap[key] = { display: name, count: 0 };
                    }
                    artistsMap[key].count++;
                }
            });

            // Converte para array e ordena alfabeticamente
            const artists = Object.values(artistsMap).sort((a, b) =>
                a.display.localeCompare(b.display, 'pt-BR')
            );

            document.getElementById('artistCount').innerText = `${artists.length} artistas`;

            renderArtistsList(artists);
        }

        function renderArtistsList(artists) {
            const container = document.getElementById('artistsList');
            const searchTerm = artistSearchInput.value.toLowerCase();

            const filtered = artists.filter(artist => artist.display.toLowerCase().includes(searchTerm));

            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-center text-zinc-500 py-4 text-xs">Nenhum artista encontrado</p>';
                return;
            }

            // Botão "Todos" sempre no topo
            let html = `
                <button onclick="setView('all')"
                    class="w-full text-left px-3 py-2 rounded-lg text-sm font-semibold flex justify-between items-center transition-colors ${currentView === 'all' ? 'bg-green-900/30 text-green-400' : 'text-zinc-400 hover:bg-zinc-800 hover:text-white'}">
                    <span>✓ Todos</span>
                    <span class="text-xs opacity-70">(${songs.length})</span>
                </button>
                <div class="border-t border-zinc-800 my-1"></div>
            `;

            filtered.forEach(artist => {
                const isActive = (currentView === 'artist' && currentArtistFilter === artist.display);
                html += `
                    <button onclick="setView('artist', '${artist.display.replace(/'/g, "\\'")}')"
                        class="w-full text-left px-3 py-2 rounded-lg text-sm flex justify-between items-center transition-colors ${isActive ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:bg-zinc-800 hover:text-white'}">
                        <span class="truncate mr-2">${artist.display}</span>
                        <span class="text-xs opacity-50 flex-shrink-0">(${artist.count})</span>
                    </button>
                `;
            });

            container.innerHTML = html;
        }

        function filterArtists() {
            // Reembaralha a fila se o shuffle estiver ativo quando a busca de artistas muda
            if (shuffle) {
                reshuffleQueue();
            }
            updateArtists(); // Re-renderiza a lista de artistas baseada no input
        }

        async function clearLibrary() {
            if (!confirm("Remover todas as músicas salvas?")) return;
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            transaction.objectStore(STORE_NAME).clear();
            transaction.oncomplete = () => {
                songs = [];
                filteredSongs = [];
                currentIndex = -1;
                audio.pause();
                renderSongs();
                updateArtists();
                updateCacheStatus("Biblioteca vazia");
                currentSongTitle.innerText = "Pronto para tocar";
                currentSongMeta.innerText = "";
            };
        }

        function updateCacheStatus(t) { cacheStatus.innerText = t; }

        window.onload = init;
    </script>
</body>
</html>
